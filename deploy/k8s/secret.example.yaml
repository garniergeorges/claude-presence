# Example Secret for storing the bootstrap admin token.
# In real deployments, prefer external secret managers (Sealed Secrets,
# External Secrets Operator, Vault) over committing this file.
#
# Bootstrap workflow:
#   kubectl apply -f deploy/k8s/pvc.yaml
#   kubectl apply -f deploy/k8s/deployment.yaml
#   kubectl apply -f deploy/k8s/service.yaml
#   kubectl exec deploy/claude-presence -- node dist/server/index.js \
#     token create --name admin --scope admin
#   # Save the printed token. Distribute to clients via .mcp.json.
#
# This Secret is only useful if you want to mount the token elsewhere
# (e.g. as an env var in a sidecar). The server itself does NOT read
# the bootstrap token from a Secret; tokens live in the SQLite volume.

apiVersion: v1
kind: Secret
metadata:
  name: claude-presence-admin-token
  labels:
    app.kubernetes.io/name: claude-presence
type: Opaque
stringData:
  # Replace with the value printed by `token create`.
  token: "cp_REPLACE_ME"
